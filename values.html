<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pet Values - Values</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header class="header">

<div class="logo">
🐾 Pet Values
</div>


<nav>

<a href="index.html">Home</a>

<a href="values.html">Values</a>

<a href="calculator.html">Calculator</a>

<a href="changes.html">Changes</a>

</nav>


</header>



<main>


<h1 class="page-title">
Pet Values
</h1>



<section class="filters">


<input 
id="search"
type="text"
placeholder="🔍 Search pet..."
>



<select id="rarityFilter">

<option value="all">
All
</option>

<option value="Basic">
Basic
</option>

<option value="Rare">
Rare
</option>

<option value="Legendary">
Legendary
</option>

<option value="Mythic">
Mythic
</option>

</select>



<select id="demandFilter">

<option value="all">
All Demand
</option>

<option value="1">
★☆☆
</option>

<option value="2">
★★☆
</option>

<option value="3">
★★★
</option>

<option value="4">
★★★🔥
</option>

</select>



<select id="versionFilter">


<option value="normal">
Normal
</option>


<option value="vintage">
💿 Vintage
</option>


<option value="neon">
🔮 Neon
</option>


</select>



<select id="sortFilter">


<option value="default">
Sort
</option>


<option value="valueHigh">
Value High → Low
</option>


<option value="valueLow">
Value Low → High
</option>


<option value="demandHigh">
Demand High → Low
</option>


<option value="demandLow">
Demand Low → High
</option>


<option value="az">
A → Z
</option>


<option value="za">
Z → A
</option>


</select>



</section>



<section>

<div id="valuesContainer" class="pet-grid">

</div>

</section>



</main>



<script src="js/data.js"></script>

<script src="js/values.js"></script>


</body>

</html>
