<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pet Values</title>

<style>
body {
    font-family: Arial, sans-serif;
    background:#f5f5ff;
    margin:0;
}

header {
    background:#7c5cff;
    color:white;
    padding:20px;
    text-align:center;
}

nav {
    background:white;
    padding:15px;
    text-align:center;
}

nav a {
    margin:8px;
    text-decoration:none;
    color:#7c5cff;
    font-weight:bold;
}

.container {
    padding:20px;
}

.card {
    background:white;
    border-radius:15px;
    padding:20px;
    margin:15px;
    text-align:center;
}

.pet-image {
    width:150px;
    height:150px;
    object-fit:contain;
}

.value {
    font-size:20px;
    font-weight:bold;
}

.demand {
    font-size:22px;
}
</style>

</head>

<body>

<header>
<h1>🐾 Pet Value List</h1>
<p>Trading Values Database</p>
</header>


<nav>
<a href="index.html">Home</a>
<a href="pets.html">Pet Values</a>
<a href="calculator.html">Pet Calculator</a>
<a href="changes.html">Value Changes</a>
<a href="demand.html">Demand Guide</a>
</nav>


<div class="container" id="petList">

</div>


<script>

const pets = [
{
name: "Mint Chip Lemur",
image: "images/Mint Chip Lemur.png",
rarity: "Legendary",
value: 100,
vintage: 475,
neon: 1345,
demand: "★★★🔥"
},

{
name: "Chocobara",
image: "images/Chocobara.png",
rarity: "Rare",
value: 10,
vintage: 43,
neon: 98,
demand: "★★☆"
}

];

];


const list = document.getElementById("petList");


pets.forEach(pet => {

list.innerHTML += `

<div class="card">

<img src="${pet.image}" class="pet-image">

<h2>${pet.name}</h2>

<p>${pet.rarity}</p>

<p class="value">
Value: ${pet.value} 💎
</p>

<p>
💿 Vintage: ${pet.vintage} 💎
</p>

<p>
🔮 Neon: ${pet.neon} 💎
</p>

<p class="demand">
Demand: ${pet.demand}
</p>

</div>

`;

});

</script>

</body>
</html>
